<!-- Sontra Records mark. Monochrome so it sits on any dark surface. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Sontra Records">
  <rect x="1" y="1" width="46" height="46" rx="4" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- waveform glyph -->
  <g stroke="#e0e0e0" stroke-width="2.4" stroke-linecap="round">
    <line x1="12" y1="24" x2="12" y2="24"/>
    <line x1="17" y1="17" x2="17" y2="31"/>
    <line x1="22" y1="12" x2="22" y2="36"/>
    <line x1="27" y1="20" x2="27" y2="28"/>
    <line x1="32" y1="15" x2="32" y2="33"/>
    <line x1="37" y1="22" x2="37" y2="26"/>
  </g>
  <circle cx="38" cy="10" r="2.5" fill="#ffffff"/>
</svg>
